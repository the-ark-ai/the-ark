<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="lightning" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE44D"/>
      <stop offset="50%" style="stop-color:#FF6B00"/>
      <stop offset="100%" style="stop-color:#FF2D2D"/>
    </linearGradient>
    <linearGradient id="ark-hull" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="50%" style="stop-color:#3F51B5"/>
      <stop offset="100%" style="stop-color:#1A237E"/>
    </linearGradient>
    <linearGradient id="ark-body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7C4DFF"/>
      <stop offset="100%" style="stop-color:#304FFE"/>
    </linearGradient>
    <linearGradient id="water1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00E5FF"/>
      <stop offset="50%" style="stop-color:#18FFFF"/>
      <stop offset="100%" style="stop-color:#00B0FF"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="25%" style="stop-color:#FFD93D"/>
      <stop offset="50%" style="stop-color:#6BCB77"/>
      <stop offset="75%" style="stop-color:#4D96FF"/>
      <stop offset="100%" style="stop-color:#9B59B6"/>
    </linearGradient>
  </defs>
  <!-- No background - transparent -->
  <!-- Ark hull -->
  <path d="M 115 325 Q 140 390 256 390 Q 372 390 397 325 L 375 325 Q 360 370 256 370 Q 152 370 137 325 Z" fill="url(#ark-hull)"/>
  <!-- Ark body -->
  <path d="M 155 325 L 172 255 L 340 255 L 357 325 Z" fill="url(#ark-body)"/>
  <!-- Deck line -->
  <line x1="167" y1="290" x2="345" y2="290" stroke="#E040FB" stroke-width="1" opacity="0.7"/>
  <!-- Windows -->
  <circle cx="210" cy="275" r="7" fill="#18FFFF"/>
  <circle cx="256" cy="275" r="7" fill="#FFE44D"/>
  <circle cx="302" cy="275" r="7" fill="#FF6B6B"/>
  <!-- Lightning bolt -->
  <polygon points="256,80 232,185 264,178 240,270 300,165 268,172 288,90" fill="url(#lightning)"/>
  <!-- Water -->
  <path d="M 70 378 Q 110 360 155 378 Q 200 396 245 378 Q 290 360 335 378 Q 380 396 425 378 Q 460 365 480 378" fill="none" stroke="url(#water1)" stroke-width="3.5"/>
  <!-- THE ARK text -->
  <text x="256" y="448" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="42" fill="url(#ring)" letter-spacing="10">THE ARK</text>
  <text x="256" y="478" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="14" fill="#18FFFF" letter-spacing="5">AI × LIGHTNING</text>
</svg>
